name: Build EyeTracker APK

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:  # permite rodar manualmente pelo site do GitHub

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Configurar JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Configurar Android SDK
        uses: android-actions/setup-android@v3

      - name: Cache do Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: gradle-

      - name: Dar permissão ao gradlew
        run: chmod +x gradlew

      - name: Compilar APK debug
        run: ./gradlew assembleDebug --no-daemon

      - name: Publicar APK como artifact
        uses: actions/upload-artifact@v4
        with:
          name: EyeTracker-debug
          path: app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30
